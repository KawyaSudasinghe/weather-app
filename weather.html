<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="weather.css">
</head>
<body>
    <div class="app">
        <button class="close-button">X</button>
        <div class="search-bar">
            <button class="curr-loc-button"></button>
            <input type="text" class="input" placeholder="Enter a City">
            <button class="get-weather-button"></button>
        </div>

        <div class="weather-widget">
            <div class="city-name data"></div>
            <div class="temp data"></div>
            <div class="feels-like"></div>
            <div class="humidity data"></div>
            <div class="desc data"></div>
            <div class="code-data"></div>
        </div>
    </div>
    <script src="weather.js"></script>
</body>
</html>
